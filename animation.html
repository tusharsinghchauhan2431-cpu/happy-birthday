<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Her</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#ffe0ec;
    --petal:#ff9ebb;
    --rose:#e8517d;
    --deep:#7a1f4b;
    --cream:#fff6f8;
    --gold:#f3c98b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background: #150710;
    overflow:hidden;
    font-family:'Cormorant Garamond', serif;
    cursor: default;
  }
  #stage{
    position:relative;
    width:100vw;
    height:100vh;
  }

  /* ---- Shifting aurora backdrop ---- */
  #aurora{
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(232,81,125,0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 25%, rgba(243,201,139,0.14) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 85%, rgba(122,31,75,0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 20%, #2a0e1e 0%, #1a0812 55%, #12060d 100%);
    background-size: 200% 200%, 200% 200%, 200% 200%, 100% 100%;
    animation: auroraShift 18s ease-in-out infinite;
  }
  @keyframes auroraShift{
    0%,100%{ background-position: 0% 0%, 100% 0%, 50% 100%, 0 0; }
    50%{ background-position: 40% 30%, 60% 40%, 40% 80%, 0 0; }
  }

  /* ---- Stars ---- */
  .star{
    position:absolute;
    background:#fff;
    border-radius:50%;
    opacity:0;
    animation: twinkle linear infinite;
    pointer-events:none;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0; }
    50%{ opacity: var(--maxop, 0.9); }
  }

  .glow{
    position:absolute;
    top:50%;left:50%;
    width:60vmin;height:60vmin;
    transform:translate(-50%,-50%);
    background: radial-gradient(circle, rgba(255,158,187,0.25) 0%, rgba(255,158,187,0) 70%);
    filter: blur(10px);
    animation: pulse 6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes pulse{
    0%,100%{ opacity:.5; transform:translate(-50%,-50%) scale(1); }
    50%{ opacity:1; transform:translate(-50%,-50%) scale(1.15); }
  }

  /* ---- Falling petals ---- */
  .petal{
    position:absolute;
    top:-10%;
    border-radius: 0 100% 0 100%;
    opacity:.85;
    pointer-events:none;
    animation-name: fall, sway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
  }
  @keyframes fall{
    0%{ transform: translateY(-10vh) rotate(0deg); }
    100%{ transform: translateY(115vh) rotate(360deg); }
  }
  @keyframes sway{
    0%,100%{ margin-left:0; }
    50%{ margin-left:40px; }
  }

  /* ---- Rising little hearts ---- */
  .rise-heart{
    position:absolute;
    bottom:-5%;
    font-size:14px;
    color: rgba(255,182,201,0.6);
    pointer-events:none;
    animation-name: rise, swayR;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
    user-select:none;
  }
  @keyframes rise{
    0%{ transform: translateY(0); opacity:0; }
    10%{ opacity:.8; }
    90%{ opacity:.5; }
    100%{ transform: translateY(-115vh); opacity:0; }
  }
  @keyframes swayR{
    0%,100%{ margin-left:0; }
    50%{ margin-left:-30px; }
  }

  /* ---- Heart canvas ---- */
  #heartCanvas{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
  }

  /* ---- Text reveal ---- */
  #textWrap{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    opacity:0;
    z-index:5;
    width:90%;
    transition: opacity 2s ease;
  }
  #textWrap.show{ opacity:1; }

  #line1{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:400;
    letter-spacing:0.35em;
    text-transform:uppercase;
    font-size: clamp(11px, 2vw, 15px);
    color: var(--gold);
    margin-bottom: 16px;
    opacity:.9;
  }

  #line2{
    font-family:'Great Vibes', cursive;
    font-size: clamp(46px, 10vw, 108px);
    line-height:1.1;
    background: linear-gradient(90deg, #ffd3e0, #ff8fb3, #ffd3e0);
    background-size: 200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation: shimmer 4s linear infinite;
    text-shadow: 0 0 40px rgba(255,158,187,0.35);
    outline:none;
  }
  @keyframes shimmer{
    to{ background-position: -200% center; }
  }

  #noteBox{
    margin-top: 22px;
    min-height: 3.2em;
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(15px, 2.1vw, 20px);
    color: #ffe6ee;
    letter-spacing: 0.03em;
    opacity:.95;
    max-width: 560px;
    margin-left:auto; margin-right:auto;
  }
  #noteBox .cursor{
    display:inline-block;
    width:2px; height:1em;
    background: var(--gold);
    margin-left:2px;
    vertical-align:-2px;
    animation: blink 0.8s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .hint{
    position:absolute;
    bottom:14px; left:50%;
    transform:translateX(-50%);
    font-family: monospace;
    font-size:10px;
    color: rgba(255,255,255,0.28);
    letter-spacing:0.05em;
    z-index:10;
    text-align:center;
    line-height:1.6;
  }

  /* cursor trail hearts */
  .trail{
    position:fixed;
    pointer-events:none;
    font-size:14px;
    color: rgba(255,158,187,0.85);
    animation: trailUp 1.1s ease-out forwards;
    z-index:20;
  }
  @keyframes trailUp{
    0%{ transform: translateY(0) scale(1); opacity:1; }
    100%{ transform: translateY(-60px) scale(0.4); opacity:0; }
  }

  /* burst hearts */
  .burst{
    position:absolute;
    left:50%; top:50%;
    font-size: 18px;
    pointer-events:none;
    opacity:0;
    z-index:15;
  }
  #scene button {
  position: absolute;
  right: 30px;
  bottom: 30px;

  background: linear-gradient(135deg, #ff4d6d, #ff1744);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 12px 28px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;

  box-shadow: 0 8px 20px rgba(255, 23, 68, 0.4);
  transition: all 0.3s ease;
}

#scene button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 12px 28px rgba(255, 23, 68, 0.6);
  background: linear-gradient(135deg, #ff5f7e, #ff2d55);
}

#scene button:active {
  transform: translateY(1px) scale(0.98);
}

#scene button:focus {
  outline: none;
}

</style>
</head>
<body>

<div id="stage">
  <div id="aurora"></div>
  <div class="glow"></div>
  <canvas id="heartCanvas"></canvas>

  <div id="textWrap">
    <div id="line1">For</div>
    <div id="line2" contenteditable="true" spellcheck="false">Rishika</div>
    <div id="noteBox"></div>
  </div>
<div id="scene">
  <button type="button" id="btn" onclick="window.location.href='index.html'" >Next</button>
</div>

  
</div>

<script>
  const stage = document.getElementById('stage');

  /* -------- Stars -------- */
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*2 + 0.5;
    s.style.width=size+'px';
    s.style.height=size+'px';
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*70+'vh';
    s.style.setProperty('--maxop', (0.4+Math.random()*0.6).toFixed(2));
    s.style.animationDuration = (2+Math.random()*4)+'s';
    s.style.animationDelay = (Math.random()*5)+'s';
    stage.appendChild(s);
  }

  /* -------- Falling petals -------- */
  const petalColors = ['#ff9ebb','#ffb6c9','#ff7aa2','#ffd3e0','#f7c9dc'];
  const petalCount = 30;
  for(let i=0;i<petalCount;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 8 + Math.random()*14;
    p.style.width = size+'px';
    p.style.height = size*0.8+'px';
    p.style.left = Math.random()*100+'vw';
    p.style.background = petalColors[Math.floor(Math.random()*petalColors.length)];
    const fallDur = 8 + Math.random()*10;
    const swayDur = 3 + Math.random()*3;
    const delay = Math.random()*10;
    p.style.animationDuration = fallDur+'s, '+swayDur+'s';
    p.style.animationDelay = '-'+delay+'s, -'+(Math.random()*swayDur)+'s';
    stage.appendChild(p);
  }

  /* -------- Rising hearts -------- */
  for(let i=0;i<18;i++){
    const h = document.createElement('div');
    h.className='rise-heart';
    h.textContent='♥';
    h.style.left = Math.random()*100+'vw';
    h.style.fontSize = (10+Math.random()*14)+'px';
    const riseDur = 9 + Math.random()*8;
    const swayDur = 4 + Math.random()*3;
    h.style.animationDuration = riseDur+'s, '+swayDur+'s';
    h.style.animationDelay = '-'+(Math.random()*riseDur)+'s, -'+(Math.random()*swayDur)+'s';
    stage.appendChild(h);
  }

  /* -------- Cursor trail hearts -------- */
  let lastTrail = 0;
  window.addEventListener('pointermove', (e)=>{
    const now = performance.now();
    if(now - lastTrail < 90) return;
    lastTrail = now;
    const t = document.createElement('div');
    t.className='trail';
    t.textContent = Math.random()<0.5 ? '♥' : '✦';
    t.style.left = (e.clientX-6)+'px';
    t.style.top = (e.clientY-6)+'px';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 1200);
  });

  /* -------- Heart particle formation -------- */
  const canvas = document.getElementById('heartCanvas');
  const ctx = canvas.getContext('2d');
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function heartPoint(t, scale, cx, cy){
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
    return { x: cx + x*scale, y: cy - y*scale };
  }

  const N = 240;
  let particles = [];
  let heartCenter = {x:0,y:0,scale:1};
  function initParticles(){
    particles = [];
    const cx = canvas.width/2;
    const cy = canvas.height/2 - canvas.height*0.05;
    const scale = Math.min(canvas.width, canvas.height) / 34;
    heartCenter = {x:cx,y:cy,scale};
    for(let i=0;i<N;i++){
      const t = (i/N) * Math.PI * 2;
      const target = heartPoint(t, scale, cx, cy);
      particles.push({
        baseT: t,
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height + canvas.height,
        tx: target.x,
        ty: target.y,
        size: 1.5 + Math.random()*2.5,
        speed: 0.02 + Math.random()*0.03,
        hue: Math.random() < 0.5 ? '255,158,187' : '243,201,139',
        twinkle: Math.random()*Math.PI*2
      });
    }
  }
  initParticles();
  window.addEventListener('resize', initParticles);

  let heartbeatT = 0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let allArrived = true;

    // heartbeat pulse once formed
    let pulseScale = 1;
    if(window.__revealed){
      heartbeatT += 0.045;
      pulseScale = 1 + Math.sin(heartbeatT*2) * 0.025 * (1+Math.sin(heartbeatT*0.5)*0.3);
    }

    particles.forEach(p=>{
      let targetX = p.tx, targetY = p.ty;
      if(window.__revealed){
        const dx = p.tx - heartCenter.x;
        const dy = p.ty - heartCenter.y;
        targetX = heartCenter.x + dx*pulseScale;
        targetY = heartCenter.y + dy*pulseScale;
      }
      p.x += (targetX - p.x) * p.speed;
      p.y += (targetY - p.y) * p.speed;
      if(Math.abs(p.tx - p.x) > 1 || Math.abs(p.ty - p.y) > 1) allArrived = false;

      p.twinkle += 0.06;
      const alpha = 0.55 + Math.sin(p.twinkle)*0.35;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.hue},${alpha})`;
      ctx.shadowColor = `rgba(${p.hue},0.8)`;
      ctx.shadowBlur = 8;
      ctx.fill();
    });

    if(allArrived && !window.__revealed){
      window.__revealed = true;
      setTimeout(()=>{
        document.getElementById('textWrap').classList.add('show');
        startTypewriter();
        burstHearts();
      }, 400);
    }

    requestAnimationFrame(animate);
  }
  animate();

  /* -------- Typewriter love notes -------- */
  const notes = [
    "You + Me — my favorite story.",
    "You are my favourite person .",
    "I never get tired of falling for you, again and again.",
    
  ];
  const noteBox = document.getElementById('noteBox');

  function startTypewriter(){
    let noteIndex = 0;
    typeNote(notes[noteIndex]);

    function typeNote(text){
      noteBox.innerHTML = '<span class="typed"></span><span class="cursor"></span>';
      const typedEl = noteBox.querySelector('.typed');
      let i = 0;
      const typeSpeed = 45;

      function typeChar(){
        if(i < text.length){
          typedEl.textContent += text.charAt(i);
          i++;
          setTimeout(typeChar, typeSpeed);
        } else {
          setTimeout(eraseNote, 2600);
        }
      }
      function eraseNote(){
        const eraseSpeed = 22;
        function eraseChar(){
          const current = typedEl.textContent;
          if(current.length > 0){
            typedEl.textContent = current.slice(0, -1);
            setTimeout(eraseChar, eraseSpeed);
          } else {
            noteIndex = (noteIndex + 1) % notes.length;
            setTimeout(()=>typeNote(notes[noteIndex]), 400);
          }
        }
        eraseChar();
      }
      typeChar();
    }
  }

  /* -------- Burst of hearts on reveal -------- */
  function burstHearts(){
    for(let i=0;i<24;i++){
      const b = document.createElement('div');
      b.className='burst';
      b.textContent = Math.random()<0.6 ? '♥' : '✦';
      b.style.color = Math.random()<0.5 ? '#ff9ebb' : '#f3c98b';
      const angle = Math.random()*Math.PI*2;
      const dist = 120 + Math.random()*220;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist;
      b.style.transition = 'transform 1.6s cubic-bezier(.2,.7,.3,1), opacity 1.6s ease';
      stage.appendChild(b);
      requestAnimationFrame(()=>{
        b.style.opacity = '0.9';
        b.style.transform = `translate(${dx}px, ${dy}px) scale(${0.6+Math.random()*0.8}) rotate(${Math.random()*180}deg)`;
      });
      setTimeout(()=>{
        b.style.opacity='0';
      }, 1300);
      setTimeout(()=>b.remove(), 3000);
    }
  }
</script>

</body>
</html>
