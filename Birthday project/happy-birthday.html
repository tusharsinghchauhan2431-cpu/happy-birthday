<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday!</title>
<style>
  :root{
    --pink:#ff6fa5;
    --pink-light:#ffc2d9;
    --purple:#a06cff;
    --gold:#ffd966;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:linear-gradient(135deg,#2b1055,#7597de 60%, #ff9ecb);
    background-size:400% 400%;
    animation:bgshift 12s ease infinite;
  }
  @keyframes bgshift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  /* ---------- Floating Hearts ---------- */
  .heart{
    position:fixed;
    bottom:-50px;
    font-size:24px;
    color:var(--pink);
    animation:floatUp linear infinite;
    pointer-events:none;
    user-select:none;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.4));
  }
  @keyframes floatUp{
    0%{transform:translateY(0) translateX(0) rotate(0deg); opacity:0;}
    10%{opacity:1;}
    50%{transform:translateY(-55vh) translateX(20px) rotate(180deg);}
    90%{opacity:1;}
    100%{transform:translateY(-110vh) translateX(-20px) rotate(360deg); opacity:0;}
  }

  /* ---------- Confetti ---------- */
  .confetti{
    position:fixed;
    top:-20px;
    width:8px;
    height:14px;
    opacity:.9;
    animation:fall linear infinite;
    pointer-events:none;
  }
  @keyframes fall{
    0%{transform:translateY(0) rotate(0deg); opacity:1;}
    100%{transform:translateY(110vh) rotate(360deg); opacity:.8;}
  }

  /* ---------- Balloons ---------- */
  .balloon{
    position:fixed;
    bottom:-120px;
    width:46px;
    height:60px;
    border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    animation:balloonRise linear infinite;
    pointer-events:none;
    box-shadow:inset -8px -8px 0 rgba(0,0,0,0.06);
  }
  .balloon::after{
    content:'';
    position:absolute;
    left:50%;
    bottom:-40px;
    width:1px;
    height:40px;
    background:rgba(255,255,255,.5);
  }
  @keyframes balloonRise{
    0%{transform:translateY(0) translateX(0);}
    50%{transform:translateY(-60vh) translateX(30px);}
    100%{transform:translateY(-130vh) translateX(-20px);}
  }

  /* ---------- Main Card ---------- */
  .wrap{
    position:relative;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:5;
  }
  .card{
    text-align:center;
    padding:50px 40px;
    border-radius:24px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
    max-width:520px;
    animation:pop 1s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop{
    0%{transform:scale(.6); opacity:0;}
    100%{transform:scale(1); opacity:1;}
  }
  .cake{
    font-size:70px;
    animation:wiggle 2s ease-in-out infinite;
  }
  @keyframes wiggle{
    0%,100%{transform:rotate(-6deg);}
    50%{transform:rotate(6deg);}
  }
  h1{
    margin:10px 0 6px;
    font-size:clamp(28px,5vw,44px);
    color:#fff;
    text-shadow:0 4px 20px rgba(255,111,165,.8);
    letter-spacing:1px;
  }
  #nameSpan{
    background:linear-gradient(90deg,var(--gold),var(--pink),var(--purple));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    background-size:200% auto;
    animation:shine 3s linear infinite;
  }
  @keyframes shine{
    to{background-position:200% center;}
  }
  p.msg{
    color:#f4f2ff;
    font-size:17px;
    line-height:1.6;
    margin:16px 0 26px;
    opacity:.95;
  }
  button{
    border:none;
    padding:14px 30px;
    border-radius:40px;
    background:linear-gradient(90deg,var(--pink),var(--purple));
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(160,108,255,.5);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  button:hover{
    transform:translateY(-3px) scale(1.04);
    box-shadow:0 12px 30px rgba(255,111,165,.6);
  }
  button:active{transform:translateY(0) scale(.98);}

  .hidden-note{
    margin-top:16px;
    font-size:13px;
    color:rgba(255,255,255,.7);
  }
 #nextbtn {
  position: fixed;      /* Keeps it at the bottom-right of the screen */
  right: 30px;
  bottom: 30px;

  background: linear-gradient(135deg, #ff4d6d, #ff1744);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 12px 28px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;

  box-shadow: 0 8px 20px rgba(255, 23, 68, 0.4);
  transition: all 0.3s ease;
  z-index: 1000;
}

#nextbtn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 12px 28px rgba(255, 23, 68, 0.6);
  background: linear-gradient(135deg, #ff5f7e, #ff2d55);
}

#nextbtn:active {
  transform: translateY(1px) scale(0.98);
}

#nextbtn:focus {
  outline: none;
}

</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="cake">🎂</div>
    <h1>Happy Birthday <span id="nameSpan">Rishuuuu</span>❤️🫂</h1>
    <p class="msg">
      Wishing you a day filled with love and everything that you want 
      that makes you smile.💖
      <br> Click the send more love button more times
    </p>
    <button onclick="burst()">Send More Love 💕</button>
    <div class="hidden-note">✨ Love You Soo Much ✨</div>
  </div>
   <button type="button" id="nextbtn" onClick="window.location.href='loveletter.html'">Next</button>
</div>

<script>
  const FRIEND_NAME = "Rishuuuu"; 
  document.getElementById('nameSpan').textContent = FRIEND_NAME;

  const heartEmojis = ['💖','💗','💕','💓','❤️','💘','✨'];
  const confettiColors = ['#ff6fa5','#ffd966','#a06cff','#7fe3ff','#ff9ecb'];
  const balloonColors = ['#ff6fa5','#a06cff','#ffd966','#7fe3ff','#ff8fab'];

  function randomBetween(min, max){ return Math.random() * (max - min) + min; }

  function spawnHeart(){
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    heart.style.left = randomBetween(0, 100) + 'vw';
    heart.style.fontSize = randomBetween(16, 36) + 'px';
    const duration = randomBetween(6, 11);
    heart.style.animationDuration = duration + 's';
    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(), duration*1000);
  }

  function spawnConfetti(){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = randomBetween(0,100) + 'vw';
    c.style.background = confettiColors[Math.floor(Math.random()*confettiColors.length)];
    c.style.transform = `rotate(${randomBetween(0,360)}deg)`;
    const duration = randomBetween(4, 8);
    c.style.animationDuration = duration + 's';
    document.body.appendChild(c);
    setTimeout(()=> c.remove(), duration*1000);
  }

  function spawnBalloon(){
    const b = document.createElement('div');
    b.className = 'balloon';
    b.style.left = randomBetween(0,95) + 'vw';
    b.style.background = balloonColors[Math.floor(Math.random()*balloonColors.length)];
    const duration = randomBetween(10, 16);
    b.style.animationDuration = duration + 's';
    document.body.appendChild(b);
    setTimeout(()=> b.remove(), duration*1000);
  }

  // continuous ambient animation
  setInterval(spawnHeart, 400);
  setInterval(spawnConfetti, 250);
  setInterval(spawnBalloon, 2200);

  // initial burst on load
  for(let i=0;i<20;i++) setTimeout(spawnHeart, i*80);
  for(let i=0;i<30;i++) setTimeout(spawnConfetti, i*40);

  function burst(){
    for(let i=0;i<35;i++) setTimeout(spawnHeart, i*30);
    for(let i=0;i<50;i++) setTimeout(spawnConfetti, i*20);
    for(let i=0;i<6;i++) setTimeout(spawnBalloon, i*150);
  }
 
</script>

</body>
</html>
