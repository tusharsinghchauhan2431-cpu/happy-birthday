<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    height: 100%;
    width: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #matrixCanvas, #starCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #starCanvas { opacity: 0; transition: opacity 1.5s ease-in; }

  #scene {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 1.5s ease-in;
    pointer-events: auto;
  }

  #candleTitle {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2px;
    max-width: 90vw;
  }
  .candle-letter {
    font-size: clamp(20px, 6vw, 34px);
    font-weight: 800;
    position: relative;
    padding-top: 26px;
    color: #fff;
    text-shadow: 0 0 8px currentColor;
  }
  .candle-letter::before {
    content: "🕯️";
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    filter: drop-shadow(0 0 6px gold);
  }

  #character {
    font-size: 80px;
    margin-top: 10px;
    animation: bob 2.4s ease-in-out infinite;
  }

  #heart {
    font-size: 28px;
    margin-top: 8px;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }
 /* Next Button */
#scene button {
  position: absolute;
  right: 30px;
  bottom: 30px;

  background: linear-gradient(135deg, #ff4d6d, #ff1744);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 12px 28px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;

  box-shadow: 0 8px 20px rgba(255, 23, 68, 0.4);
  transition: all 0.3s ease;
}

#scene button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 12px 28px rgba(255, 23, 68, 0.6);
  background: linear-gradient(135deg, #ff5f7e, #ff2d55);
}

#scene button:active {
  transform: translateY(1px) scale(0.98);
}

#scene button:focus {
  outline: none;
}

</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>
<canvas id="starCanvas"></canvas>

<div id="scene">
  <div id="candleTitle"></div>
  <div id="character">🐻</div>
  <div id="heart">❤️</div>
  
  <button type="button" id="btn" onclick="window.location.href='happy-birthday.html'" >Next</button>
</div>




<script>
/* ======== EDIT THESE ======== */

const NAME = " Rishu";               
const MESSAGES = ["3","2","1","HAPPY", "BIRTHDAY",  "Rishu"];
const MS_PER_WORD = 2000;           // how long each word is held
const CANDLE_COLORS = ["#ff3b3b","#ff9f1a","#ffd23f","#4ade80","#38bdf8","#a78bfa","#f472b6"];
/* ============================= */

const matrixCanvas = document.getElementById("matrixCanvas");
const mctx = matrixCanvas.getContext("2d");
const starCanvas = document.getElementById("starCanvas");
const sctx = starCanvas.getContext("2d");

function resize(){
  matrixCanvas.width = window.innerWidth;
  matrixCanvas.height = window.innerHeight;
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ---------- MATRIX RAIN INTRO ---------- */
const glyphs = "I LOVE YOU".split("");
const fontSize = 16;
let columns, drops;

function initColumns(){
  columns = Math.floor(matrixCanvas.width / fontSize);
  drops = new Array(columns).fill(0).map(() => Math.random() * -50);
}
initColumns();
window.addEventListener("resize", initColumns);

let currentWordIndex = 0;
let wordStartTime = performance.now();
let introDone = false;

function drawMatrix(now){
  if (introDone) return;

  mctx.fillStyle = "rgba(5,0,10,0.15)";
  mctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

  mctx.font = fontSize + "px monospace";
  for (let i = 0; i < columns; i++){
    const text = glyphs[Math.floor(Math.random() * glyphs.length)];
    const x = i * fontSize;
    const y = drops[i] * fontSize;

   mctx.fillStyle = "#ff1744";      // ← text color
mctx.shadowColor = "#ff4569";   // ← glow color
    mctx.shadowBlur = 6;
    mctx.fillText(text, x, y);
    mctx.shadowBlur = 0;

    if (y > matrixCanvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }

  // overlay current word
  const word = MESSAGES[currentWordIndex];
  mctx.textAlign = "center";
  mctx.textBaseline = "middle";
  const size = Math.min(matrixCanvas.width / (word.length * 0.65), 90);
  mctx.font = "bold " + size + "px Arial";
  mctx.fillStyle = "#ffffff";
  mctx.shadowColor = "#ff2d78";
  mctx.shadowBlur = 25;
  mctx.fillText(word, matrixCanvas.width / 2, matrixCanvas.height / 2);
  mctx.shadowBlur = 0;

  if (now - wordStartTime > MS_PER_WORD){
    currentWordIndex++;
    wordStartTime = now;
    if (currentWordIndex >= MESSAGES.length){
      introDone = true;
      finishIntro();
      return;
    }
  }

  requestAnimationFrame(drawMatrix);
}
requestAnimationFrame(drawMatrix);

/* ---------- STARRY NIGHT SCENE ---------- */
const stars = [];
for (let i = 0; i < 260; i++){
  stars.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.5 + 0.3,
    phase: Math.random() * Math.PI * 2,
    speed: 0.02 + Math.random() * 0.03
  });
}

function drawStars(){
  sctx.fillStyle = "#04041a";
  sctx.fillRect(0, 0, starCanvas.width, starCanvas.height);
  for (const s of stars){
    s.phase += s.speed;
    const alpha = 0.4 + Math.sin(s.phase) * 0.6;
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sctx.fillStyle = `rgba(255,255,255,${Math.max(0, alpha)})`;
    sctx.fill();
  }
  requestAnimationFrame(drawStars);
}
drawStars();

/* ---------- BUILD CANDLE TITLE ---------- */
function buildCandleTitle(){
  const container = document.getElementById("candleTitle");
  const text = "HAPPY BIRTHDAY " + NAME;
  container.innerHTML = "";
  [...text].forEach((ch, i) => {
    if (ch === " "){
      const spacer = document.createElement("div");
      spacer.style.width = "10px";
      container.appendChild(spacer);
      return;
    }
    const span = document.createElement("span");
    span.className = "candle-letter";
    span.textContent = ch;
    span.style.color = CANDLE_COLORS[i % CANDLE_COLORS.length];
    container.appendChild(span);
  });
}
buildCandleTitle();

/* ---------- TRANSITION ---------- */
function finishIntro(){
  starCanvas.style.opacity = "1";
  document.getElementById("scene").style.opacity = "1";
}



</script>

</body>
</html>
